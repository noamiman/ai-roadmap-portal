<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Knowledge Portal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eef4ff;
            --side: rgba(255, 255, 255, 0.56);
            --accent: #2f7cff;
            --accent-soft: rgba(47, 124, 255, 0.14);
            --text: #10203a;
            --text-dim: rgba(16, 32, 58, 0.72);
            --card: rgba(255, 255, 255, 0.42);
            --border: rgba(255, 255, 255, 0.5);
            --focus: #153c8a;
            --bg-elevated: rgba(255, 255, 255, 0.34);
            --glass-strong: rgba(255, 255, 255, 0.7);
            --glass-highlight: rgba(255, 255, 255, 0.82);
            --glass-shadow: 0 22px 60px rgba(91, 117, 167, 0.22);
            --glass-shadow-soft: 0 10px 28px rgba(116, 140, 190, 0.18);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background:
                radial-gradient(circle at 16% 14%, rgba(109, 181, 255, 0.45) 0%, rgba(109, 181, 255, 0) 28%),
                radial-gradient(circle at 84% 12%, rgba(255, 175, 214, 0.3) 0%, rgba(255, 175, 214, 0) 30%),
                radial-gradient(circle at 78% 78%, rgba(130, 233, 255, 0.34) 0%, rgba(130, 233, 255, 0) 26%),
                linear-gradient(180deg, #f7faff 0%, #eef4ff 52%, #e8f0ff 100%);
            color: var(--text);
            font-family: 'Assistant', sans-serif;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(38px);
            opacity: 0.7;
            z-index: -1;
        }

        body::before {
            top: 72px;
            left: -80px;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(138,198,255,0.5) 46%, rgba(138,198,255,0) 74%);
        }

        body::after {
            right: -90px;
            bottom: 6vh;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(255,255,255,0.85) 0%, rgba(142,255,236,0.34) 42%, rgba(142,255,236,0) 72%);
        }

        body[data-theme="dark"] {
            --bg: #0b1020;
            --side: rgba(17, 24, 39, 0.58);
            --accent: #7bc7ff;
            --accent-soft: rgba(123, 199, 255, 0.16);
            --text: #eef4ff;
            --text-dim: rgba(238, 244, 255, 0.72);
            --card: rgba(16, 24, 40, 0.44);
            --border: rgba(255, 255, 255, 0.12);
            --focus: #f8d568;
            --bg-elevated: rgba(25, 35, 58, 0.4);
            --glass-strong: rgba(26, 36, 59, 0.74);
            --glass-highlight: rgba(255, 255, 255, 0.14);
            --glass-shadow: 0 24px 70px rgba(2, 6, 23, 0.52);
            --glass-shadow-soft: 0 12px 30px rgba(2, 6, 23, 0.38);
            background:
                radial-gradient(circle at 15% 12%, rgba(57, 132, 255, 0.3) 0%, rgba(57, 132, 255, 0) 28%),
                radial-gradient(circle at 82% 18%, rgba(160, 118, 255, 0.2) 0%, rgba(160, 118, 255, 0) 26%),
                radial-gradient(circle at 76% 78%, rgba(53, 211, 255, 0.16) 0%, rgba(53, 211, 255, 0) 24%),
                linear-gradient(180deg, #08101d 0%, #0a1120 48%, #111b31 100%);
        }

        body.a11y-large-text { font-size: 1.16rem; }
        body.a11y-large-text .welcome-card p,
        body.a11y-large-text .section-header p,
        body.a11y-large-text .creator-desc,
        body.a11y-large-text .tool-card p,
        body.a11y-large-text .step-card p { font-size: 1.14em; }
        body.a11y-large-text .nav-item { font-size: 1.06em; }
        body.a11y-large-text .tool-btn,
        body.a11y-large-text .creator-link,
        body.a11y-large-text .contact-link-subtitle { font-size: 0.95em; }
        body.a11y-large-text .section-header h2,
        body.a11y-large-text .welcome-card h1 { font-size: 1.18em; }
        body.a11y-large-text .step-card h4,
        body.a11y-large-text .tool-card h5 { font-size: 1.12em; }

        body.a11y-high-contrast {
            --accent: #0369a1;
            --accent-soft: rgba(3, 105, 161, 0.22);
            --text: #020617;
            --text-dim: #0f172a;
            --border: #0c4a6e;
            --focus: #b45309;
        }

        body[data-theme="dark"].a11y-high-contrast {
            --accent: #7dd3fc;
            --accent-soft: rgba(125, 211, 252, 0.22);
            --text: #f8fafc;
            --text-dim: #e2e8f0;
            --border: #60a5fa;
            --focus: #facc15;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skip-link {
            position: absolute;
            top: -48px;
            right: 16px;
            background: var(--focus);
            color: #ffffff;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            text-decoration: none;
            z-index: 3000;
            font-weight: 700;
            transition: top 0.2s ease;
        }
        .skip-link:focus {
            top: 12px;
        }

        a:focus-visible,
        button:focus-visible,
        .nav-item:focus-visible,
        .step-card:focus-visible,
        .tool-btn:focus-visible,
        .creator-panel-card:focus-visible {
            outline: 3px solid var(--focus);
            outline-offset: 3px;
        }

        nav {
            width: 300px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.52) 0%, rgba(255, 255, 255, 0.32) 100%);
            border: 1px solid var(--border);
            position: fixed;
            top: 16px;
            right: 16px;
            bottom: 16px;
            padding: 1.3rem 1.05rem;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            border-radius: 30px;
            backdrop-filter: blur(24px) saturate(165%);
            -webkit-backdrop-filter: blur(24px) saturate(165%);
            box-shadow: var(--glass-shadow);
            box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-highlight), inset 0 -1px 0 rgba(255,255,255,0.18);
            transition: 0.3s;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            font-size: 1.08rem;
            margin-bottom: 1.4rem;
            text-align: center;
            letter-spacing: 0.9px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.45);
        }
        .nav-item {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 0.78rem 1rem;
            margin-bottom: 0.42rem;
            border-radius: 18px;
            cursor: pointer;
            transition: transform 0.22s ease, background 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, color 0.22s ease;
            color: var(--text-dim);
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: linear-gradient(180deg, rgba(255,255,255,0.26) 0%, rgba(255,255,255,0.12) 100%);
            text-align: right;
            font-family: inherit;
            font-size: 0.98rem;
        }
        .nav-item:hover { transform: translateY(-1px); background: linear-gradient(180deg, rgba(255,255,255,0.36) 0%, rgba(255,255,255,0.18) 100%); color: var(--accent); border-color: rgba(255, 255, 255, 0.34); box-shadow: var(--glass-shadow-soft); }
        .nav-item.active {
            background: linear-gradient(180deg, rgba(255,255,255,0.58) 0%, rgba(255,255,255,0.3) 100%);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.62);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.88), 0 10px 28px rgba(111, 146, 207, 0.24);
        }
        .nav-icon { margin-left: 10px; }

        /* Desktop sidebar tab — sticks to the left edge of the nav panel */
        .nav-tab-btn {
            position: fixed;
            top: 50%;
            right: 316px;
            transform: translateY(-50%);
            width: 22px;
            height: 58px;
            background: linear-gradient(180deg, rgba(255,255,255,0.58) 0%, rgba(255,255,255,0.32) 100%);
            border: 1px solid var(--border);
            border-right: none;
            border-radius: 14px 0 0 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            font-size: 0.72rem;
            color: var(--text-dim);
            transition: right 0.3s ease, background 0.2s, color 0.2s, box-shadow 0.2s ease;
            backdrop-filter: blur(18px) saturate(155%);
            -webkit-backdrop-filter: blur(18px) saturate(155%);
            box-shadow: -8px 0 24px rgba(109, 130, 175, 0.16), inset 0 1px 0 rgba(255,255,255,0.72);
            font-family: inherit;
            line-height: 1;
            padding: 0;
        }
        .nav-tab-btn::after { content: '»'; }
        .nav-tab-btn:hover { background: linear-gradient(180deg, rgba(255,255,255,0.68) 0%, rgba(255,255,255,0.38) 100%); color: var(--accent); }
        .nav-tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        body[data-theme="dark"] .nav-tab-btn {
            background: rgba(17, 27, 46, 0.86);
            border-color: rgba(56, 189, 248, 0.18);
            box-shadow: -4px 0 14px rgba(2, 6, 23, 0.45);
        }

        /* Mobile bottom handle (hidden on desktop) */
        .nav-handle-btn { display: none; }

        /* Collapsed state — desktop */
        body.nav-collapsed nav {
            transform: translateX(calc(100% + 32px));
            opacity: 0;
            pointer-events: none;
        }
        body.nav-collapsed main { margin-right: 16px; }
        body.nav-collapsed .nav-tab-btn { right: 0; }
        body.nav-collapsed .nav-tab-btn::after { content: '«'; }

        main { margin-right: 332px; padding: 2.5rem 2.8rem; width: 100%; transition: 0.3s; }
        .content-section { display: none; max-width: 1160px; margin: 0 auto; }
        .content-section.active { display: block; animation: fadeIn 0.4s ease-out; }

        /* Welcome Card */
        .welcome-container { display: flex; justify-content: center; align-items: center; min-height: 96vh; margin-top: 0; padding-top: calc(3.8rem - 70px); }
        .welcome-card {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.56) 0%, rgba(255,255,255,0.3) 100%);
            padding: 4.25rem 4.3rem 3.55rem;
            border-radius: 38px;
            border: 1px solid var(--border);
            box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.95), inset 0 -1px 0 rgba(255,255,255,0.18);
            text-align: center;
            width: 100%;
            max-width: 1260px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(28px) saturate(170%);
            -webkit-backdrop-filter: blur(28px) saturate(170%);
        }
        .welcome-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.52) 0%, rgba(255,255,255,0.08) 46%, rgba(255,255,255,0.22) 100%);
            pointer-events: none;
        }
        .welcome-card::after {
            content: "";
            position: absolute;
            inset: auto -90px -120px auto;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(160, 225, 255, 0.44) 0%, rgba(160, 225, 255, 0) 72%);
            pointer-events: none;
        }
        .welcome-card h1, .welcome-card p, .contact-links { position: relative; z-index: 1; }
        .welcome-card h1 { font-size: 2.35rem; color: var(--text); margin-bottom: 1.35rem; line-height: 1.14; text-shadow: 0 1px 0 rgba(255,255,255,0.42); }
        .welcome-card p { font-size: 1.08rem; line-height: 1.8; margin-bottom: 0.95rem; }
        .contact-links { margin-top: 1.6rem; padding-top: 1.2rem; border-top: 1px solid rgba(255,255,255,0.34); }
        .contact-links p { margin-bottom: 1rem; font-size: 1rem; color: var(--text-dim); }
        .contact-links-row { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        .contact-link-card { display: inline-flex; align-items: center; gap: 0.7rem; padding: 1rem 1.25rem; min-width: 190px; border-radius: 22px; text-decoration: none; color: var(--text); background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.18) 100%); border: 1px solid rgba(255,255,255,0.38); box-shadow: var(--glass-shadow-soft), inset 0 1px 0 rgba(255,255,255,0.7); backdrop-filter: blur(18px) saturate(160%); -webkit-backdrop-filter: blur(18px) saturate(160%); transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
        .contact-link-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.62); box-shadow: 0 16px 34px rgba(104, 136, 190, 0.22), inset 0 1px 0 rgba(255,255,255,0.78); }
        .contact-link-icon { width: 42px; height: 42px; display: inline-flex; align-items: center; justify-content: center; border-radius: 14px; background: linear-gradient(180deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.24) 100%); color: var(--accent); font-size: 1.15rem; box-shadow: inset 0 1px 0 rgba(255,255,255,0.78); }
        .contact-link-text { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .contact-link-title { font-size: 1rem; font-weight: 700; color: var(--text); }
        .contact-link-subtitle { font-size: 0.85rem; color: var(--text-dim); }
        .welcome-footer { margin-top: 1.75rem; padding: 1rem 1.2rem; border-radius: 16px; background: linear-gradient(135deg, var(--accent-soft) 0%, var(--bg-elevated) 100%); }

        /* Floating Creators Panel */
        .floating-creators-btn { position: fixed; top: 22px; left: 22px; z-index: 1200; border: 1px solid rgba(255,255,255,0.42); border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,0.58) 0%, rgba(255,255,255,0.24) 100%); color: var(--text); padding: 0.88rem 1.25rem; font-size: 0.92rem; font-weight: 800; cursor: pointer; box-shadow: var(--glass-shadow-soft), inset 0 1px 0 rgba(255,255,255,0.82); backdrop-filter: blur(20px) saturate(165%); -webkit-backdrop-filter: blur(20px) saturate(165%); transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
        .floating-creators-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(96, 126, 181, 0.24), inset 0 1px 0 rgba(255,255,255,0.88); border-color: rgba(255,255,255,0.62); }
        .creators-backdrop { position: fixed; inset: 0; background: rgba(142, 159, 188, 0.18); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1190; opacity: 0; pointer-events: none; transition: opacity 0.22s ease; }
        .creators-backdrop.open { opacity: 1; pointer-events: auto; }
        .creators-panel { position: fixed; top: 0; left: 0; height: 100vh; width: min(430px, 92vw); background: linear-gradient(180deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.28) 100%); border-right: 1px solid var(--border); box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.72); z-index: 1210; transform: translateX(-102%); transition: transform 0.25s ease; display: flex; flex-direction: column; backdrop-filter: blur(26px) saturate(170%); -webkit-backdrop-filter: blur(26px) saturate(170%); }
        .creators-panel.open { transform: translateX(0); }
        .creators-panel-header { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; padding: 1rem 1.1rem; border-bottom: 1px solid var(--border); }
        .creators-panel-header h3 { font-size: 1.15rem; color: var(--text); }
        .creators-close { border: 1px solid rgba(255,255,255,0.35); background: linear-gradient(180deg, rgba(255,255,255,0.56) 0%, rgba(255,255,255,0.22) 100%); color: var(--text); width: 34px; height: 34px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; line-height: 1; box-shadow: inset 0 1px 0 rgba(255,255,255,0.72); }
        .creators-panel-subtitle { padding: 0.8rem 1.1rem 0; color: var(--text-dim); font-size: 0.92rem; line-height: 1.6; }
        .creators-panel-list { overflow-y: auto; padding: 0.9rem 1rem 1rem; display: grid; gap: 0.8rem; }
        .creator-panel-card { background: linear-gradient(180deg, rgba(255,255,255,0.46) 0%, rgba(255,255,255,0.18) 100%); border-radius: 22px; border: 1px solid rgba(255,255,255,0.38); padding: 1rem; text-decoration: none; color: inherit; transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease; box-shadow: inset 0 1px 0 rgba(255,255,255,0.7); }
        .creator-panel-card:hover { border-color: rgba(255,255,255,0.62); transform: translateY(-1px); box-shadow: 0 12px 24px rgba(104, 136, 190, 0.18), inset 0 1px 0 rgba(255,255,255,0.8); }
        .creator-panel-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.45rem; }
        .creator-name { font-size: 1.15rem; font-weight: 800; color: var(--text); }
        .creator-platform-badge { font-size: 0.75rem; font-weight: 700; padding: 0.3rem 0.7rem; border-radius: 999px; white-space: nowrap; }
        .platform-youtube { background: rgba(255,0,0,0.1); color: #b91c1c; border: 1px solid rgba(255,0,0,0.2); }
        .platform-twitter, .platform-x { background: rgba(0,0,0,0.07); color: #1a1a1a; border: 1px solid rgba(0,0,0,0.15); }
        .platform-blog, .platform-substack { background: rgba(249,115,22,0.1); color: #c2410c; border: 1px solid rgba(249,115,22,0.25); }
        .platform-linkedin { background: rgba(14,165,233,0.1); color: #0369a1; border: 1px solid rgba(14,165,233,0.25); }
        .platform-web { background: rgba(100,116,139,0.1); color: #475569; border: 1px solid rgba(100,116,139,0.2); }
        .creator-desc { font-size: 0.97rem; color: var(--text-dim); line-height: 1.65; flex: 1; }
        .creator-link { display: inline-block; font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-top: 0.4rem; text-decoration: none; }
        .creator-link:hover { text-decoration: underline; }


        .section-header { text-align: center; margin-bottom: 2.8rem; padding: 2.25rem; background: linear-gradient(180deg, rgba(255,255,255,0.56) 0%, rgba(255,255,255,0.24) 100%); border-radius: 34px; border: 1px solid var(--border); box-shadow: var(--glass-shadow-soft), inset 0 1px 0 rgba(255,255,255,0.82); backdrop-filter: blur(24px) saturate(165%); -webkit-backdrop-filter: blur(24px) saturate(165%); }
        .section-header .badge { display: inline-block; background: linear-gradient(180deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.28) 100%); color: var(--accent); padding: 0.5rem 1.35rem; border-radius: 999px; font-size: 0.82rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 1rem; box-shadow: inset 0 1px 0 rgba(255,255,255,0.84), 0 8px 18px rgba(104, 136, 190, 0.18); border: 1px solid rgba(255,255,255,0.42); }
        .section-header h2 { font-size: 2.5rem; color: var(--text); margin-bottom: 1rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .section-header h2 .emoji { font-size: 2rem; }
        .section-header p { font-size: 1.2rem; color: var(--text-dim); line-height: 1.6; max-width: 600px; margin: 0 auto; }

        /* Roadmap Layout */
        .main-layout { display: grid; grid-template-columns: 1.7fr 1fr; gap: 3rem; align-items: start; }
        .roadmap-box, .tools-box { text-align: center; }
        .box-title { font-size: 1.12rem; margin-bottom: 1.2rem; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.28); padding-bottom: 0.7rem; text-align: center; }
        .roadmap-timeline { position: relative; border-right: 2px solid rgba(255,255,255,0.26); padding-right: 2.5rem; }
        .subject-group { margin-bottom: 2.25rem; padding: 0.4rem 0.6rem 0.2rem 0; border-right: 3px solid rgba(111, 196, 255, 0.65); border-radius: 16px; }
        .subject-title { font-size: 1.08rem; font-weight: 800; color: var(--text); margin-bottom: 1rem; padding: 0.85rem 1rem; border-radius: 18px; border: 1px solid rgba(255,255,255,0.32); background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 100%); display: flex; align-items: center; justify-content: center; flex-wrap: wrap; text-align: center; gap: 0.7rem; box-shadow: inset 0 1px 0 rgba(255,255,255,0.7); }
        .subject-level-badge { font-size: 0.75rem; font-weight: 700; padding: 0.32rem 0.55rem; border-radius: 999px; border: 1px solid transparent; letter-spacing: 0.2px; white-space: nowrap; }
        .subject-group.level-beginner { border-right-color: #34d399; }
        .subject-group.level-beginner .subject-title { color: #065f46; background: linear-gradient(135deg, rgba(16,185,129,0.12) 0%, rgba(255,255,255,0.96) 100%); border-color: rgba(16,185,129,0.28); }
        .subject-group.level-beginner .subject-level-badge { background: rgba(16,185,129,0.14); color: #065f46; border-color: rgba(16,185,129,0.32); }
        .subject-group.level-intermediate { border-right-color: #f59e0b; }
        .subject-group.level-intermediate .subject-title { color: #92400e; background: linear-gradient(135deg, rgba(245,158,11,0.14) 0%, rgba(255,255,255,0.96) 100%); border-color: rgba(245,158,11,0.3); }
        .subject-group.level-intermediate .subject-level-badge { background: rgba(245,158,11,0.14); color: #92400e; border-color: rgba(245,158,11,0.35); }
        .subject-group.level-advanced { border-right-color: #f87171; }
        .subject-group.level-advanced .subject-title { color: #991b1b; background: linear-gradient(135deg, rgba(248,113,113,0.14) 0%, rgba(255,255,255,0.96) 100%); border-color: rgba(248,113,113,0.33); }

            .a11y-toolbar {
                max-height: 280px;
                opacity: 1;
                overflow: hidden;
                transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease, padding-top 0.25s ease, border-top-color 0.25s ease;
            }
            /* Mobile: desktop tab hidden, bottom handle shown */
            .nav-tab-btn { display: none !important; }
            .nav-handle-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;

            /* Collapse only the links — handle always stays visible */
            .nav-links-wrapper {
                display: grid;
                grid-template-rows: 1fr;
                transition: grid-template-rows 0.38s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;

<body>
    <a href="#mainContent" class="skip-link">דלג לתוכן הראשי</a>
    <div id="a11yLive" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <nav aria-label="ניווט ראשי">
        <div class="logo">AI_ULTIMATE</div>
        <div class="nav-links-wrapper">
            <div class="nav-links">{{ nav_html|safe }}</div>
        </div>
        <div class="a11y-toolbar" id="a11yToolbar" aria-label="כלי נגישות בסיסיים">
            <button type="button" class="a11y-main-btn" id="a11yToggle" onclick="toggleA11yToolbar()" aria-expanded="false" aria-controls="a11yOptions">
                <span class="a11y-main-label">נגישות</span>
                <span class="a11y-main-icon" aria-hidden="true">♿</span>
            </button>
            <div class="a11y-options" id="a11yOptions">
                <button type="button" class="a11y-option-btn" id="toggleTextSize" onclick="toggleA11ySetting('largeText')" aria-pressed="false">טקסט גדול יותר</button>
                <button type="button" class="a11y-option-btn" id="toggleContrast" onclick="toggleA11ySetting('highContrast')" aria-pressed="false">ניגודיות גבוהה</button>
                <button type="button" class="a11y-option-btn" id="toggleDarkMode" onclick="toggleA11ySetting('darkMode')" aria-pressed="false">מצב כהה</button>
                <button type="button" class="a11y-option-btn a11y-reset-btn" onclick="resetA11ySettings()">איפוס הגדרות נגישות</button>
            </div>
        </div>
        <button type="button" class="nav-handle-btn" id="navHandleBtn" onclick="toggleNav()" aria-label="סגור תפריט"></button>
    </nav>
    <button type="button" class="nav-tab-btn" id="navTabBtn" onclick="toggleNav()" aria-label="סגור תפריט"></button>
    <main id="mainContent" tabindex="-1">
        {{ sections_html|safe }}
    </main>
    {{ creators_panel_html|safe }}
    <script>
        const SEEN_KEY = 'ai_roadmap_seen';
        const A11Y_KEY = 'ai_roadmap_accessibility';
        let lastFocusedElement = null;

        function getA11yState() {
            try {
                return {
                    largeText: false,
                    highContrast: false,
                    darkMode: false,
                    ...JSON.parse(localStorage.getItem(A11Y_KEY) || '{}'),
                };
            } catch (e) {
                return { largeText: false, highContrast: false, darkMode: false };
            }
        }

        function saveA11yState(state) {
            localStorage.setItem(A11Y_KEY, JSON.stringify(state));
        }

        function announceA11y(message) {
            const live = document.getElementById('a11yLive');
            if (!live) return;
            live.textContent = '';
            window.setTimeout(() => {
                live.textContent = message;
            }, 15);
        }

        function applyA11yState(state) {
            document.body.classList.toggle('a11y-large-text', !!state.largeText);
            document.body.classList.toggle('a11y-high-contrast', !!state.highContrast);
            if (state.darkMode) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.removeAttribute('data-theme');
            }

            const map = [
                ['toggleTextSize', state.largeText],
                ['toggleContrast', state.highContrast],
                ['toggleDarkMode', state.darkMode],
            ];
            map.forEach(([id, value]) => {
                const btn = document.getElementById(id);
                if (btn) {
                    btn.setAttribute('aria-pressed', value ? 'true' : 'false');
                }
            });
        }

        function toggleA11ySetting(setting) {
            const state = getA11yState();
            state[setting] = !state[setting];
            saveA11yState(state);
            applyA11yState(state);

            const labels = {
                largeText: 'טקסט גדול יותר',
                highContrast: 'ניגודיות גבוהה',
                darkMode: 'מצב כהה',
            };
            announceA11y(`${labels[setting]} ${state[setting] ? 'הופעל' : 'כובה'}`);
        }

        function resetA11ySettings() {
            const state = { largeText: false, highContrast: false, darkMode: false };
            saveA11yState(state);
            applyA11yState(state);
            announceA11y('הגדרות הנגישות אופסו');
        }

        function toggleA11yToolbar() {
            const toolbar = document.getElementById('a11yToolbar');
            const toggleBtn = document.getElementById('a11yToggle');
            if (!toolbar || !toggleBtn) return;
            const willOpen = !toolbar.classList.contains('open');
            toolbar.classList.toggle('open', willOpen);
            toggleBtn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
        }

        function closeA11yToolbar() {
            const toolbar = document.getElementById('a11yToolbar');
            const toggleBtn = document.getElementById('a11yToggle');
            if (!toolbar || !toggleBtn) return;
            toolbar.classList.remove('open');
            toggleBtn.setAttribute('aria-expanded', 'false');
        }

        function getSeen() {
            try { return JSON.parse(localStorage.getItem(SEEN_KEY) || '{}'); } catch(e) { return {}; }
        }

        function toggleSeen(btn) {
            const wrapper = btn.closest('.step-card-wrapper');
            if (!wrapper) return;
            const url = wrapper.dataset.url;
            const seen = getSeen();
            if (seen[url]) {
                delete seen[url];
                wrapper.classList.remove('seen');
                btn.setAttribute('aria-pressed', 'false');
                btn.setAttribute('aria-label', 'סמן כמדריך שנצפה');
                btn.title = 'סמן כמדריך שנצפה';
            } else {
                seen[url] = 1;
                wrapper.classList.add('seen');
                btn.setAttribute('aria-pressed', 'true');
                btn.setAttribute('aria-label', 'בטל סימון נצפה');
                btn.title = 'בטל סימון נצפה';
            }
            localStorage.setItem(SEEN_KEY, JSON.stringify(seen));
        }

        const NAV_KEY = 'navCollapsed';

        function updateNavToggleLabels(collapsed) {
            const label = collapsed ? 'פתח תפריט' : 'סגור תפריט';
            ['navTabBtn', 'navHandleBtn'].forEach(function(id) {
                const btn = document.getElementById(id);
                if (btn) btn.setAttribute('aria-label', label);
            });
        }

        function toggleNav() {
            const collapsed = document.body.classList.toggle('nav-collapsed');
            if (collapsed) {
                closeA11yToolbar();
            }
            try { localStorage.setItem(NAV_KEY, collapsed ? '1' : '0'); } catch(e) {}
            updateNavToggleLabels(collapsed);
        }

        document.addEventListener('DOMContentLoaded', function () {
            // Restore nav collapsed state
            let navCollapsed = false;
            try {
                if (localStorage.getItem(NAV_KEY) === '1') {
                    document.body.classList.add('nav-collapsed');
                    navCollapsed = true;
                }
            } catch(e) {}
            updateNavToggleLabels(navCollapsed);

            const state = getA11yState();
            applyA11yState(state);

            const seen = getSeen();
            document.querySelectorAll('.step-card-wrapper[data-url]').forEach(function (wrapper) {
                const btn = wrapper.querySelector('.seen-btn');
                if (seen[wrapper.dataset.url]) {
                    wrapper.classList.add('seen');
                    if (btn) {
                        btn.setAttribute('aria-pressed', 'true');
                        btn.setAttribute('aria-label', 'בטל סימון נצפה');
                        btn.title = 'בטל סימון נצפה';
                    }
                } else if (btn) {
                    btn.setAttribute('aria-pressed', 'false');
                    btn.setAttribute('aria-label', 'סמן כמדריך שנצפה');
                    btn.title = 'סמן כמדריך שנצפה';
                }
            });
        });

        function showSection(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const section = document.getElementById(id);
            section.classList.add('active');
            el.classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.removeAttribute('aria-current'));
            el.setAttribute('aria-current', 'page');
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
            section.focus({ preventScroll: true });
        }

        function toggleCreatorsPanel() {
            const panel = document.getElementById('creatorsPanel');
            const backdrop = document.getElementById('creatorsBackdrop');
            const btn = document.querySelector('.floating-creators-btn');
            const closeBtn = panel ? panel.querySelector('.creators-close') : null;
            if (!panel || !backdrop || !btn) {
                return;
            }
            const willOpen = !panel.classList.contains('open');
            if (willOpen) {
                lastFocusedElement = document.activeElement;
            }
            panel.classList.toggle('open', willOpen);
            backdrop.classList.toggle('open', willOpen);
            btn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
            panel.setAttribute('aria-hidden', willOpen ? 'false' : 'true');
            if (willOpen && closeBtn) {
                closeBtn.focus();
            }
        }

        function closeCreatorsPanel() {
            const panel = document.getElementById('creatorsPanel');
            const backdrop = document.getElementById('creatorsBackdrop');
            const btn = document.querySelector('.floating-creators-btn');
            if (!panel || !backdrop || !btn) {
                return;
            }
            panel.classList.remove('open');
            backdrop.classList.remove('open');
            btn.setAttribute('aria-expanded', 'false');
            panel.setAttribute('aria-hidden', 'true');
            if (lastFocusedElement && typeof lastFocusedElement.focus === 'function') {
                lastFocusedElement.focus();
                lastFocusedElement = null;
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeCreatorsPanel();
            }
        });

        document.addEventListener('click', function(event) {
            const panel = document.getElementById('creatorsPanel');
            const btn = document.querySelector('.floating-creators-btn');
            if (!panel || !btn || !panel.classList.contains('open')) {
                return;
            }
            if (!panel.contains(event.target) && !btn.contains(event.target)) {
                closeCreatorsPanel();
            }
        });
    </script>
</body>
</html>
